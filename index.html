<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muktha & Rajat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0c0214;
      --card-bg: rgba(20, 10, 28, 0.46);
      --card-border: rgba(255, 255, 255, 0.16);
      --text-main: #ffffff;
      --text-soft: #fbeaf2;
      --text-body: #fff8fb;
      --shadow: rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg-dark);
      color: var(--text-main);
      text-align: center;
      overflow: hidden;
      font-family: "Cormorant Garamond", Georgia, serif;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      background: var(--bg-dark);
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.06) 0%,
        rgba(0, 0, 0, 0.14) 32%,
        rgba(0, 0, 0, 0.44) 100%
      );
      z-index: 1;
    }

    .text {
      position: absolute;
      left: 50%;
      bottom: 7vh;
      transform: translateX(-50%);
      width: min(88vw, 820px);
      padding: 26px 30px;
      z-index: 3;

      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: 0 12px 42px var(--shadow);
    }

    h1 {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 1.05;
      font-weight: 600;
      color: var(--text-main);
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.75);
      letter-spacing: 0.01em;
    }

    .couple {
      display: inline-block;
      white-space: nowrap;
    }

    h2 {
      margin: 10px 0 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(22px, 2.5vw, 32px);
      font-weight: 500;
      color: var(--text-soft);
      letter-spacing: 0.02em;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.55);
    }

    p {
      max-width: 700px;
      margin: 18px auto 0;
      font-size: clamp(20px, 1.85vw, 28px);
      line-height: 1.45;
      color: var(--text-body);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .signature {
      margin-top: 18px;
      font-size: clamp(18px, 1.6vw, 24px);
      line-height: 1.25;
      color: #fff3f8;
      font-style: italic;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
    }

    .footer {
      position: absolute;
      bottom: 12px;
      width: 100%;
      z-index: 3;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 15px;
      letter-spacing: 0.06em;
      color: #f6eef4;
      opacity: 0.92;
    }

    canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    @media (max-width: 900px) {
      .text {
        width: 90vw;
        padding: 22px 22px;
      }
    }

    @media (max-width: 640px) {
      .hero img {
        object-fit: contain;
        object-position: center top;
        background: var(--bg-dark);
      }

      .overlay {
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.04) 0%,
          rgba(0, 0, 0, 0.10) 48%,
          rgba(0, 0, 0, 0.34) 100%
        );
      }

      .text {
        bottom: 4vh;
        width: 92vw;
        padding: 18px 16px;
        border-radius: 20px;
        background: rgba(20, 10, 28, 0.58);
      }

      h1 {
        font-size: clamp(28px, 7.4vw, 40px);
      }

      .couple {
        white-space: normal;
      }

      h2 {
        font-size: clamp(20px, 5vw, 26px);
      }

      p {
        font-size: clamp(18px, 4.6vw, 22px);
        line-height: 1.35;
      }

      .signature {
        font-size: clamp(17px, 4.2vw, 21px);
      }

      .footer {
        font-size: 13px;
        bottom: 10px;
      }
    }

    @media (max-width: 430px) {
      .text {
        bottom: 3.5vh;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>

  <div class="hero">
    <img src="wedding-photo.png" alt="Congratulations celebration image" />
    <div class="overlay"></div>

    <div class="text">
      <h1><span class="couple">Muktha ❤️ Rajat</span></h1>
      <h2>Wishing You a Lifetime of Happiness</h2>

      <p>
        May your marriage be filled with love, laughter, and countless beautiful memories.
        May every day together bring joy, adventure, and warmth to your hearts.
      </p>

      <div class="signature">
        With love,<br />
        Raj
      </div>
    </div>

    <div class="footer">gabhru.xyz</div>
  </div>

  <script>
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const particles = [];

    function randomColor() {
      const colors = ["#FFD700", "#FFEC8B", "#FFF4B2", "#FFC857", "#FFE066"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function createFirework() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * (canvas.height * 0.42);

      for (let i = 0; i < 65; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3.3 + 1.1;

        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 78 + Math.random() * 18,
          radius: Math.random() * 2 + 1,
          color: randomColor()
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.015;
        p.life -= 1;

        ctx.globalAlpha = Math.max(p.life / 100, 0);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    setInterval(createFirework, 1200);
    createFirework();
    animate();
  </script>
</body>
</html>
