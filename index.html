<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muktha & Rajat</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #0c0214;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        rgba(0, 0, 0, 0.2),
        rgba(0, 0, 0, 0.65)
      );
    }

    .text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      max-width: 850px;
      width: 92%;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5.4vw, 70px);
      text-shadow: 0 6px 30px rgba(0, 0, 0, 0.7);
      font-weight: 700;
    }

    .couple {
      white-space: nowrap;
      display: inline-block;
    }

    h2 {
      font-size: clamp(20px, 3vw, 36px);
      margin-top: 12px;
      margin-bottom: 0;
      font-weight: normal;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    p {
      font-size: clamp(16px, 2.2vw, 24px);
      margin-top: 24px;
      line-height: 1.65;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.45);
    }

    .signature {
      margin-top: 28px;
      font-style: italic;
      font-size: clamp(16px, 2vw, 22px);
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.45);
    }

    .footer {
      position: absolute;
      bottom: 18px;
      width: 100%;
      font-size: 14px;
      opacity: 0.9;
      z-index: 2;
      letter-spacing: 0.4px;
    }

    canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .text {
        width: 94%;
      }

      p {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>

  <div class="hero">
    <img src="wedding-photo.png" alt="Congratulations celebration image" />
    <div class="overlay"></div>

    <div class="text">
      <h1><span class="couple">Muktha ❤️ Rajat</span></h1>
      <h2>Wishing You a Lifetime of Happiness</h2>

      <p>
        May your marriage be filled with love, laughter, and countless beautiful memories.
        May every day together bring joy, adventure, and warmth to your hearts.
      </p>

      <div class="signature">
        With love,<br />
        Shivani, Rohan, Raj
      </div>
    </div>

    <div class="footer">gabhru.xyz</div>
  </div>

  <script>
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const particles = [];

    function randomColor() {
      const colors = ["#FFD700", "#FFEC8B", "#FFF4B2", "#FFC857", "#FFE066"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function createFirework() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * (canvas.height * 0.5);

      for (let i = 0; i < 70; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3.5 + 1.2;

        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 80 + Math.random() * 20,
          radius: Math.random() * 2 + 1,
          color: randomColor()
        });
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.015;
        p.life -= 1;

        ctx.globalAlpha = Math.max(p.life / 100, 0);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    setInterval(createFirework, 1200);
    createFirework();
    animate();
  </script>
</body>
</html>
