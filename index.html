<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Congratulations!</title>

<style>
body {
    margin: 0;
    font-family: "Georgia", serif;
    background: #faf7f5;
    text-align: center;
    color: #333;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px;
}

h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.message {
    font-size: 22px;
    line-height: 1.6;
    margin-top: 30px;
}

.image-container {
    margin-top: 40px;
}

img {
    width: 100%;
    max-width: 600px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.signature {
    margin-top: 40px;
    font-size: 20px;
    font-style: italic;
}
</style>
</head>

<body>

<div class="container">

<h1>Congratulations ❤️</h1>

<div class="image-container">
<img src="wedding-photo.png" alt="Wedding Photo">
</div>

<div class="message">
Wishing you both a lifetime filled with love, laughter, and unforgettable memories.<br><br>

May your journey together be full of adventure, kindness, and endless joy.
</div>

<div class="signature">
With love,<br>
Raj
</div>

</div>

</body>
</html>
